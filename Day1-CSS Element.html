<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day1-CSS Element Selector</title>
    <style>
        h1{
            text-align: center;
            background-color: brown;
            color: black;
        }
        h2{
            text-align: center;
            background-color: purple;
            color: black;
        }

</head>
<body>
    <!-- Element selector- for single html element using tag names -->
    <h1>Day1-CSS Element Selector</h1>
    <p></p>
    <h2>HTML</h2>
    <h3>CSS</h3>
</body>
</html>
