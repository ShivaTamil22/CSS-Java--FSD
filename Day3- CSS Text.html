<html>
    <head>
        <title>CSS Text properties</title>
        <link href="https://fonts.googleapis.com/css2?family=Jim+Nightshade&display=swap" rel="stylesheet">
        <style>
            body{
                background-color: rgba(136, 70, 171, 0.89);
                
            }
            h1{
                text-align: center;
                color: white;
                font-family: Jim Nightshade;
                margin: 50px;
                padding: 20px;
                border-color: rgb(134, 58, 58);
                word-spacing: 10px;
                letter-spacing: 10px;
                text-transform: uppercase;
                background-color: rgba(34, 14, 54, 0.712);
                background-position: 20px;
                border-radius: 20px;
                text-shadow: 1px 2px 2px;
                box-shadow: 10px 10px 5px rgb(72, 66, 132);
                cursor: pointer;
            }
            
            p{
                font-weight: 900;
                text-indent: 50px;
                font-size: 30;

            }
            
            div{
                font-weight: bold;
                font-size: larger;   
            }
        </style>
    </head>
    <body>
        <h1>
            Text Properties
        </h1>
        <p>Text properties are used to make texts more stye colorful to get attractive User Interface.</p>
        <div>
        
        </div>
        
    </body>
</html>
